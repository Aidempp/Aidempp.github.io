<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Liste automatique des véhicules</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px black;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(0,0,0,0.5);
        margin-top: 20px;
    }

    th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    th {
        background: #d32f2f;
        text-align: center;
    }

    td {
        text-align: center;
    }
</style>

</head>
<body>

<h1>Liste automatique des véhicules</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Engin + CIS</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody id="liste"></tbody>
</table>

<script>
// On récupère les véhicules enregistrés dans la gestion
let vehicules = JSON.parse(localStorage.getItem("vehicules")) || [];

// Exemple de descriptions automatiques selon le type d'engin
function descriptionAutomatique(numero) {
    numero = numero.toUpperCase();

    if (numero.includes("VSAV")) return "Véhicule de Secours et d’Assistance aux Victimes";
    if (numero.includes("FPT")) return "Fourgon Pompe Tonne";
    if (numero.includes("VLC")) return "Véhicule Léger de Commandement";
    if (numero.includes("CCF")) return "Camion Citerne Feux de Forêts";
    if (numero.includes("EPA")) return "Échelle Pivotante Automatique";

    return "Aucune description disponible";
}

function afficher() {
    const tbody = document.getElementById("liste");
    tbody.innerHTML = "";

    vehicules.forEach(v => {
        const desc = descriptionAutomatique(v.numero);

        tbody.innerHTML += `
            <tr>
                <td>${v.id}</td>
                <td>${v.numero} ${v.cis}</td>
                <td>${desc}</td>
            </tr>
        `;
    });
}

afficher();
</script>

</body>
</html>
