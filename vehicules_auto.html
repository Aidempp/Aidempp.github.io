<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Liste automatique des véhicules MPP</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px black;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(0,0,0,0.6);
        border-radius: 10px;
        overflow: hidden;
        font-size: 15px;
    }

    th {
        background: #d32f2f;
        padding: 10px;
        font-size: 17px;
        text-shadow: 1px 1px 2px black;
    }

    td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .ok { background: rgba(0, 200, 0, 0.25); }
    .attention { background: rgba(255, 165, 0, 0.25); }
    .urgent { background: rgba(255, 0, 0, 0.25); }
    .critique { background: rgba(150, 0, 255, 0.25); }
</style>

</head>
<body>

<h1>Liste automatique des véhicules MPP</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Engin</th>
            <th>Statut</th>
            <th>Dernière mise à jour</th>
            <th>Flux XML</th>
        </tr>
    </thead>
    <tbody id="liste"></tbody>
</table>

<script>
async function chargerVehicule(id) {
    const url = `https://monpompier.com/flux/vehicules/${id}.xml`;

    try {
        const response = await fetch(url);
        if (!response.ok) return null;

        const xmlText = await response.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");

        const channel = xml.querySelector("channel");
        if (!channel) return null;

        const nom = channel.querySelector("title")?.textContent.trim() || "Inconnu";

        const items = [...xml.querySelectorAll("item")];
        let statut = "Inconnu";
        let maj = "--";

        for (const item of items) {
            const title = item.querySelector("title")?.textContent.trim() || "";
            const desc = item.querySelector("description")?.textContent.trim() || "";

            if (title === "Changement d'état" && desc.includes("est :")) {
                statut = desc.split("est :")[1].trim();
                maj = item.querySelector("pubDate")?.textContent.trim() || "--";
            }
        }

        return { id, nom, statut, maj };

    } catch {
        return null;
    }
}

async function chargerTous() {
    const tbody = document.getElementById("liste");

    for (let id = 1; id <= 2500; id++) {
        const v = await chargerVehicule(id);
        if (!v) continue;

        const classe =
            v.statut.includes("Disponible") ? "ok" :
            v.statut.includes("Maintenance") ? "attention" :
            v.statut.includes("Indisponible") ? "urgent" :
            "critique";

        const tr = document.createElement("tr");
        tr.className = classe;

        tr.innerHTML = `
            <td>${v.id}</td>
            <td>${v.nom}</td>
            <td>${v.statut}</td>
            <td>${v.maj}</td>
            <td><a href="https://monpompier.com/flux/vehicules/${v.id}.xml" target="_blank" style="color:#64b5f6;">Voir</a></td>
        `;

        tbody.appendChild(tr);
    }
}

chargerTous();
</script>

</body>
</html>
