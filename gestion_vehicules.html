<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion des véhicules</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px black;
    }

    input, select {
        padding: 10px;
        margin: 5px;
        width: 250px;
        border-radius: 5px;
        border: none;
    }

    button {
        padding: 10px 20px;
        background: #d32f2f;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
    }

    button:hover {
        background: #ff4444;
    }

    table {
        width: 100%;
        margin-top: 30px;
        border-collapse: collapse;
        background: rgba(0,0,0,0.5);
    }

    th, td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    th {
        background: #d32f2f;
    }

    .btn-suppr {
        background: #ff4444;
    }

    .btn-modif {
        background: #ffaa00;
    }
</style>

</head>
<body>

<h1>Gestion des véhicules</h1>

<h2>Ajouter / Modifier un véhicule</h2>

<div>
    <input type="number" id="id" placeholder="ID du véhicule">
    <input type="text" id="nom" placeholder="Nom du véhicule">
    <input type="text" id="statut" placeholder="Statut">
    <button onclick="ajouterVehicule()">Enregistrer</button>
</div>

<h2>Liste des véhicules</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Statut</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="liste"></tbody>
</table>

<script>
let vehicules = JSON.parse(localStorage.getItem("vehicules")) || [];

function sauvegarder() {
    localStorage.setItem("vehicules", JSON.stringify(vehicules));
}

function afficher() {
    const tbody = document.getElementById("liste");
    tbody.innerHTML = "";

    vehicules.forEach((v, index) => {
        tbody.innerHTML += `
            <tr>
                <td>${v.id}</td>
                <td>${v.nom}</td>
                <td>${v.statut}</td>
                <td>
                    <button class="btn-modif" onclick="charger(${index})">Modifier</button>
                    <button class="btn-suppr" onclick="supprimer(${index})">Supprimer</button>
                </td>
            </tr>
        `;
    });
}

function ajouterVehicule() {
    const id = document.getElementById("id").value;
    const nom = document.getElementById("nom").value;
    const statut = document.getElementById("statut").value;

    if (!id || !nom) {
        alert("ID et nom obligatoires");
        return;
    }

    const existant = vehicules.find(v => v.id == id);

    if (existant) {
        existant.nom = nom;
        existant.statut = statut;
    } else {
        vehicules.push({ id, nom, statut });
    }

    sauvegarder();
    afficher();
}

function charger(index) {
    const v = vehicules[index];
    document.getElementById("id").value = v.id;
    document.getElementById("nom").value = v.nom;
    document.getElementById("statut").value = v.statut;
}

function supprimer(index) {
    vehicules.splice(index, 1);
    sauvegarder();
    afficher();
}

afficher();
</script>

</body>
</html>
