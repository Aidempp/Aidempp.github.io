<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un avis mensuel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('Fond pompier Aide MPP.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: #d32f2f;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            font-size: 16px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
            font-size: 36px;
            color: white;
            text-shadow: 2px 2px 4px black;
        }

        .avis-box {
            width: 70%;
            margin: 40px auto;
            background-color: rgba(0,0,0,0.65);
            padding: 25px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 0 12px black;
        }

        .avis-box h2 {
            color: #ffcc00;
            text-shadow: 2px 2px 4px black;
            margin-bottom: 20px;
        }

        .avis-box h3 {
            margin-top: 25px;
            color: #ff4444;
            text-shadow: 2px 2px 4px black;
        }

        .avis-section {
            background-color: rgba(255,255,255,0.08);
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #ff4444;
        }

        select, input[type="text"] {
            width: 250px;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            margin-top: 5px;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            resize: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-generate {
            background-color: #ff4444;
            color: white;
        }

        .btn-copy {
            background-color: #ffcc00;
            color: black;
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="mensuel.html">Avis du mois</a>
        <a href="promotion.html">Promotion</a>
        <a href="sanction.html">Sanction</a>
        <a href="Véhicules.html">Véhicules</a>
    </nav>

    <h1>Créer un avis mensuel</h1>

    <div class="avis-box">
        <h2>Formulaire</h2>

        <!-- 1 • Mois -->
        <h3>1 • Mois</h3>
        <div class="avis-section">
            <label>Mois :</label><br>
            <select id="mois">
                <option>Janvier 2026</option>
                <option>Février 2026</option>
                <option>Mars 2026</option>
                <option>Avril 2026</option>
                <option>Mai 2026</option>
                <option>Juin 2026</option>
                <option>Juillet 2026</option>
                <option>Août 2026</option>
                <option>Septembre 2026</option>
                <option>Octobre 2026</option>
                <option>Novembre 2026</option>
                <option>Décembre 2026</option>
            </select>
        </div>

        <!-- 2 • Identité -->
        <h3>2 • Identité</h3>
        <div class="avis-section">
            <label>Grade :</label><br>
            <select id="grade">
                <option>Sapeur 2ème classe</option>
                <option>Sapeur 1ère classe</option>
                <option>Caporal</option>
                <option>Caporal-Chef</option>
                <option>Sergent</option>
                <option>Sergent-Chef</option>
                <option>Adjudant</option>
                <option>Adjudant-Chef</option>
                <option>Lieutenant</option>
                <option>Capitaine</option>
                <option>Commandant</option>
                <option>Lieutenant-colonel</option>
                <option>Colonel</option>
            </select>
            <br><br>

            <label>Prénom :</label><br>
            <input type="text" id="prenom" placeholder="Pseudo">
        </div>

        <!-- 3 • Statistiques -->
        <h3>3 • Statistiques</h3>
        <div class="avis-section">
            <label>DPA :</label><br>
            <input type="text" id="dpa" placeholder="Dépense de PA">
            <br><br>

            <label>CP :</label><br>
            <input type="text" id="cp" placeholder="Condition physique">
            <br><br>

            <label>Humeur :</label><br>
            <input type="text" id="humeur" placeholder="Humeur">
        </div>

        <!-- 4 • Comportement & Présence -->
        <h3>4 • Comportement & Présence</h3>
        <div class="avis-section">
            <label>Présence :</label><br>
            <select id="presence">
                <option>Présence quotidienne</option>
                <option>Présence régulière</option>
                <option>Présence irrégulière</option>
                <option>Présence insuffisante</option>
            </select>
            <br><br>

            <label>Communication :</label><br>
            <select id="communication">
                <option>Excellente</option>
                <option>Très bonne</option>
                <option>Bonne</option>
                <option>Passable</option>
                <option>Mauvaise</option>
            </select>
            <br><br>

            <label>Comportement :</label><br>
            <select id="comportement">
                <option>Excellent</option>
                <option>Très bon</option>
                <option>Bon</option>
                <option>Moyen</option>
                <option>Mauvais</option>
            </select>
            <br><br>

            <label>Investissement :</label><br>
            <select id="investissement">
                <option>Excellent</option>
                <option>Très bon</option>
                <option>Bon</option>
                <option>Moyen</option>
                <option>Mauvais</option>
            </select>
        </div>

        <!-- 5 • Obligations -->
        <h3>5 • Obligations</h3>
        <div class="avis-section">
            <label>Planning débloqué :</label><br>
            <select id="planning">
                <option>Dans les temps</option>
                <option>En retard</option>
            </select>
            <br><br>

            <label>EPI :</label><br>
            <select id="epi">
                <option>Correct</option>
                <option>Incorrect</option>
            </select>
            <br><br>

            <label>FMA :</label><br>
            <select id="fma">
                <option>À jour</option>
                <option>Non à jour</option>
            </select>
            <br><br>

            <label>Bagage formatif :</label><br>
            <select id="bagage">
                <option>Excellent</option>
                <option>Insuffisant</option>
            </select>
            <br><br>

            <label>Rappels / Avertissements :</label><br>
            <select id="rappel">
                <option>Aucun</option>
                <option>Rappel officiel</option>
                <option>Avertissement niveau 1</option>
                <option>Avertissement niveau 2</option>
                <option>Avertissement niveau 3</option>
                <option>Avertissement niveau 4</option>
            </select>
        </div>

        <!-- 6 • Signature -->
        <h3>6 • Signature</h3>
        <div class="avis-section">

            <label>Ton grade :</label><br>
            <select id="grade-sign">
                <option>Sergent-chef</option>
                <option>Adjudant</option>
                <option>Adjudant-chef</option>
                <option>Lieutenant</option>
                <option>Capitaine</option>
                <option>Commandant</option>
                <option>Lieutenant-colonel</option>
                <option>Colonel</option>
            </select>
            <br><br>

            <label>Ton pseudo :</label><br>
            <input type="text" id="pseudo" placeholder="Ton pseudo">
            <br><br>

            <label>Ta fonction :</label><br>
            <select id="fonction">
                <option>Chef de section</option>
                <option>Chef de centre</option>
                <option>Chef de centre adjoint</option>
            </select>
            <br><br>

            <label>Caserne :</label><br>
            <select id="caserne">
                <option>CIS Alpilles-Durance</option>
                <option>CIS Chateaurenard</option>
                <option>CIS Eyguières</option>
                <option>CIS Istres</option>
                <option>CIS Lambesc</option>
                <option>CIS Mallemort</option>
                <option>CIS Salon-de-Provence</option>
                <option>CIS Vallée des Baux</option>

                <option>CIS Bischwiller</option>
                <option>CIS Molsheim</option>
                <option>CIS Petersbach</option>
                <option>CIS Saverne</option>
                <option>CIS Strasbourg Ouest</option>
                <option>CIS Truchtersheim</option>
                <option>CIS Val de Moder</option>
                <option>CIS Wasselonne</option>
            </select>

        </div>

        <!-- 7 • Génération -->
        <h3>7 • Générer l'avis</h3>
        <div class="avis-section">
            <button class="btn-generate" onclick="genererAvis()">Générer l'avis</button>
            <button class="btn-copy" onclick="copierTexte()">Copier le texte</button>
        </div>

        <h3>Avis généré</h3>
        <div class="avis-section">
            <textarea id="avisFinal"></textarea>
        </div>

    </div>

<script>
function genererAvis() {

    const mois = document.getElementById("mois").value;
    const grade = document.getElementById("grade").value;
    const prenom = document.getElementById("prenom").value;

    const dpa = document.getElementById("dpa").value;
    const cp = document.getElementById("cp").value;
    const humeur = document.getElementById("humeur").value;

    const presence = document.getElementById("presence").value.toLowerCase();
    const communication = document.getElementById("communication").value.toLowerCase();
    const comportement = document.getElementById("comportement").value.toLowerCase();
    const investissement = document.getElementById("investissement").value.toLowerCase();

    const planning = document.getElementById("planning").value;
    const epi = document.getElementById("epi").value.toLowerCase();
    const fma = document.getElementById("fma").value;
    const bagage = document.getElementById("bagage").value.toLowerCase();
    const rappel = document.getElementById("rappel").value;

    const gradeSign = document.getElementById("grade-sign").value;
    const pseudo = document.getElementById("pseudo").value;
    const fonction = document.getElementById("fonction").value;
    const caserne = document.getElementById("caserne").value;

    const date = new Date().toLocaleDateString("fr-FR");

    // Gestion du texte rappel/avertissement
    let texteRappel = "";
    if (rappel === "Aucun") {
        texteRappel = "Pas de rappel ni avertissement ce mois-ci.";
    } else {
        texteRappel = `Un ${rappel.toLowerCase()} a été notifié ce mois-ci.`;
    }

    // Gestion du planning
    let textePlanning = "";
    if (planning === "Dans les temps") {
        textePlanning = "en temps et en heure";
    } else {
        textePlanning = "avec du retard";
    }

    // Gestion FMA
    let texteFMA = "";
    if (fma === "À jour") {
        texteFMA = "en temps et en heure";
    } else {
        texteFMA = "avec du retard";
    }

    const texte = 
`[Avis ${mois}]

Le ${grade} ${prenom} a une ${presence} au sein du CIS. 
Les statistiques sont excellentes avec une dépense de PA's à ${dpa}, une Condition Physique à ${cp} et son Humeur à ${humeur}. 
La communication est ${communication} que ce soit avec le personnel du CIS ou la hiérarchie. 
Comportement ${comportement} au sein du CIS et un investissement ${investissement} pour sa carrière ainsi qu'au sein du CIS. 
Les plannings sont débloqués ${textePlanning}. 
L'entretien ainsi que la demande des EPI sont ${epi}. 
Le bagage formatif est ${bagage}. 
Les FMA sont réalisées ${texteFMA}. 
${texteRappel} 
Excellent mois, continue ainsi.

- Le ${date} - ${gradeSign}, ${fonction}, ${caserne}, SDIS 13`;

    document.getElementById("avisFinal").value = texte;
}

function copierTexte() {
    const zone = document.getElementById("avisFinal");
    zone.select();
    document.execCommand("copy");
    alert("Avis copié !");
}
</script>

</body>
</html>
