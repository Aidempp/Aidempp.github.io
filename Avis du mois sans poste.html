<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un avis mensuel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('Fond pompier Aide MPP.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: #d32f2f;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            font-size: 16px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
            font-size: 36px;
            color: white;
            text-shadow: 2px 2px 4px black;
        }

        .avis-box {
            width: 70%;
            margin: 40px auto;
            background-color: rgba(0,0,0,0.65);
            padding: 25px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 0 12px black;
        }

        .avis-box h2 {
            color: #ffcc00;
            text-shadow: 2px 2px 4px black;
            margin-bottom: 20px;
        }

        .avis-box h3 {
            margin-top: 25px;
            color: #ff4444;
            text-shadow: 2px 2px 4px black;
        }

        .avis-section {
            background-color: rgba(255,255,255,0.08);
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #ff4444;
        }

        /* STYLE DES MENUS DÉROULANTS ET INPUTS */
        select, input[type="text"] {
            width: 250px;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            margin-top: 5px;
        }

        label {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="mensuel.html">Avis du mois</a>
        <a href="promotion.html">Promotion</a>
        <a href="sanction.html">Sanction</a>
        <a href="Véhicules.html">Véhicules</a>
    </nav>

    <h1>Créer un avis mensuel</h1>

    <div class="avis-box">
        <h2>Formulaire</h2>

        <!-- 1 • Mois -->
        <h3>1 • Mois</h3>
        <div class="avis-section">
            <label for="mois"><strong>Mois :</strong></label><br>
            <select id="mois">
                <option>Janvier 2026</option>
                <option>Février 2026</option>
                <option>Mars 2026</option>
                <option>Avril 2026</option>
                <option>Mai 2026</option>
                <option>Juin 2026</option>
                <option>Juillet 2026</option>
                <option>Août 2026</option>
                <option>Septembre 2026</option>
                <option>Octobre 2026</option>
                <option>Novembre 2026</option>
                <option>Décembre 2026</option>
            </select>
        </div>

        <!-- 2 • Identité -->
        <h3>2 • Identité</h3>
        <div class="avis-section">
            <label for="grade"><strong>Grade :</strong></label><br>
            <select id="grade">
                <option>Sapeur 2ème classe</option>
                 <option>Sapeur 1ère classe</option>
                <option>Caporal</option>
                <option>Caporal-Chef</option>
                <option>Sergent</option>
                <option>Sergent-Chef</option>
                <option>Adjudant</option>
                <option>Adjudant-Chef</option>
                <option>Lieutenant</option>
                 <option>Capitaine</option>
                 <option>Commandant</option>
                 <option>Lieutenant-colonel</option>
                 <option>Colonel</option>
            </select>
            <br><br>

            <label for="prenom"><strong>Pseudo :</strong></label><br>
            <input type="text" id="prenom" placeholder="Pseudo">
        </div>

        <!-- 3 • Statistiques -->
        <h3>3 • Statistiques</h3>
        <div class="avis-section">

            <label for="dpa"><strong>DPA :</strong></label><br>
            <input type="text" id="Dépense de PA" placeholder="Dépense de PA">
            <br><br>

            <label for="cp"><strong>CP :</strong></label><br>
            <input type="text" id="Condition physique" placeholder="Condition physique">
            <br><br>

            <label for="humeur"><strong>Humeur :</strong></label><br>
            <input type="text" id="Humeur" placeholder="Humeur">
        </div>

        <!-- 4 • Comportement & Présence -->
        <h3>4 • Comportement & Présence</h3>
        <div class="avis-section">

            <label for="presence"><strong>Présence :</strong></label><br>
            <select id="presence">
                <option>Présence quotidienne</option>
                <option>Présence régulière</option>
                <option>Présence irrégulière</option>
                <option>Présence insuffisante</option>
            </select>
            <br><br>

            <label for="communication"><strong>Communication :</strong></label><br>
            <select id="communication">
                <option>Excellente</option>
                <option>Très bonne</option>
                <option>Bonne</option>
                <option>Passable</option>
                <option>Mauvaise</option>
            </select>
            <br><br>

            <label for="comportement"><strong>Comportement :</strong></label><br>
            <select id="comportement">
                <option>Excellent</option>
                <option>Très bon</option>
                <option>Bon</option>
                <option>Moyen</option>
                <option>Mauvais</option>
            </select>
            <br><br>

            <label for="investissement"><strong>Investissement :</strong></label><br>
            <select id="investissement">
                <option>Excellent</option>
                <option>Très bon</option>
                <option>Bon</option>
                <option>Moyen</option>
                <option>Mauvais</option>
            </select>

        </div>

    </div>

</body>
</html>
